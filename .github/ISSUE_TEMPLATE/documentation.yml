name: Documentation issue
description: Report unclear, missing, or incorrect documentation.
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: textarea
    id: page
    attributes:
      label: Page or section
      description: Which README/docs section needs work?
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What is unclear or missing?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested wording or fix
